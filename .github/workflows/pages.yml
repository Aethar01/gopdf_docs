name: Documentation

on:
  push:
    branches:
      - main
  repository_dispatch:
    types:
      - gopdf-update
  schedule:
    - cron: "17 * * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout documentation site
        uses: actions/checkout@v4
        with:
          path: docs-site

      - name: Checkout gopdf
        uses: actions/checkout@v4
        with:
          repository: Aethar01/gopdf
          ref: main
          fetch-depth: 0
          path: gopdf

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: gopdf/go.mod
          cache-dependency-path: gopdf/go.sum

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"
          cache: pip
          cache-dependency-path: docs-site/requirements.txt

      - name: Install native dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes libgtk-3-dev pkg-config

      - name: Install documentation dependencies
        run: pip install -r docs-site/requirements.txt

      - name: Assemble current and tagged documentation
        shell: bash
        run: |
          set -euo pipefail
          root="${GITHUB_WORKSPACE}"

          build_site() {
            local reference="$1"
            local destination="$2"
            cp "${reference}" "${root}/docs-site/docs/reference.md"
            mkdocs build \
              --strict \
              --config-file "${root}/docs-site/mkdocs.yml" \
              --site-dir "${destination}"
          }

          (
            cd "${root}/gopdf"
            go run ./cmd/builddocs
          )

          current_reference="${root}/gopdf/docs/reference.md"
          if [ ! -f "${current_reference}" ]; then
            current_reference="${root}/current-reference.md"
            printf '# Reference\n\nThe generated reference will be available after the corresponding gopdf source update is published.\n' > "${current_reference}"
          fi

          build_site "${current_reference}" "${root}/_site"
          build_site "${current_reference}" "${root}/_site/git"

          versions='[{"version":"git","title":"git","aliases":["latest"]}'
          while IFS= read -r tag; do
            if ! git -C "${root}/gopdf" cat-file -e "${tag}:cmd/builddocs/main.go" 2>/dev/null || ! git -C "${root}/gopdf" show "${tag}:cmd/builddocs/main.go" | grep -q 'docs/reference.md'; then
              continue
            fi

            worktree="$(mktemp -d)"
            git -C "${root}/gopdf" worktree add --detach "${worktree}" "${tag}"
            (
              cd "${worktree}"
              go run ./cmd/builddocs
            )
            build_site "${worktree}/docs/reference.md" "${root}/_site/${tag}"
            git -C "${root}/gopdf" worktree remove --force "${worktree}"
            versions+=",{\"version\":\"${tag}\",\"title\":\"${tag}\",\"aliases\":[]}"
          done < <(git -C "${root}/gopdf" tag --sort=-version:refname)
          versions+=']'

          printf '%s\n' "${versions}" > "${root}/_site/versions.json"
          cp "${root}/_site/versions.json" "${root}/_site/git/versions.json"
          while IFS= read -r tag; do
            if [ -d "${root}/_site/${tag}" ]; then
              cp "${root}/_site/versions.json" "${root}/_site/${tag}/versions.json"
            fi
          done < <(git -C "${root}/gopdf" tag --sort=-version:refname)

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
